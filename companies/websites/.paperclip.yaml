schema: "paperclip/v1"
agents:
  venture-lead:
    role: "pm"
    adapter:
      type: "claude_local"
      config:
        model: "claude-sonnet-4-6"
        maxTurnsPerRun: 100
        dangerouslySkipPermissions: true
    permissions:
      canCreateAgents: false
  spec-writer:
    role: "engineer"
    adapter:
      type: "codex_local"
      config:
        dangerouslyBypassApprovalsAndSandbox: false
  implementor:
