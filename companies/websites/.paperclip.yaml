      config:
        dangerouslyBypassApprovalsAndSandbox: false
  debugger:
    role: "qa"
    adapter:
      type: "claude_local"
      config:
        model: "claude-opus-4-6"
        maxTurnsPerRun: 200
        dangerouslySkipPermissions: true
