schema: "paperclip/v1"
agents:
  venture-lead:
    role: "pm"
    adapter:
      type: "claude_local"
      config:
        model: "claude-sonnet-4-6"
        maxTurnsPerRun: 100
        dangerouslySkipPermissions: true
    permissions:
      canCreateAgents: false
  spec-writer:
    role: "engineer"
    adapter:
      type: "codex_local"
      config:
        dangerouslyBypassApprovalsAndSandbox: false
  implementor:
    role: "engineer"
    adapter:
      type: "claude_local"
      config:
        model: "claude-sonnet-4-6"
        maxTurnsPerRun: 300
        dangerouslySkipPermissions: true
        env:
          # Force subscription auth for the implementor: Claude Code uses
          # ANTHROPIC_API_KEY if it's non-empty in the process env, else
          # falls back to its logged-in subscription. Clearing it here
          # shadows any key the host shell inherits, so the implementor
          # always runs on the Claude Code / Max subscription.
          # Orchestration agents (venture-lead, debugger) deliberately
          # omit this override: they inherit whatever the host env has,
          # so setting ANTHROPIC_API_KEY on the host pushes orchestration
          # to API billing while this agent stays on the subscription.
          ANTHROPIC_API_KEY: ""
  validator:
    role: "qa"
    adapter:
      type: "codex_local"
      config:
        dangerouslyBypassApprovalsAndSandbox: false
  debugger:
    role: "qa"
    adapter:
      type: "claude_local"
      config:
        model: "claude-opus-4-6"
        maxTurnsPerRun: 200
        dangerouslySkipPermissions: true
projects:
  demo:
    status: "in_progress"
    workspaces:
      demo:
        name: "demo"
        isPrimary: true
        sourceType: "local_path"
        cwd: "/tmp/mock-website-current"
        visibility: "default"
sidebar:
  agents:
    - "venture-lead"
    - "implementor"
    - "spec-writer"
  projects:
    - "demo"
