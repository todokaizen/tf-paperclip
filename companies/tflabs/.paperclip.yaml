schema: "paperclip/v1"
agents:
  venture-lead:
    role: "pm"
    adapter:
      type: "claude_local"
      config:
        model: "claude-sonnet-4-6"
        maxTurnsPerRun: 100
        dangerouslySkipPermissions: false
    permissions:
      canCreateAgents: false
  spec-writer:
    role: "engineer"
    adapter:
      type: "codex_local"
      config:
        dangerouslyBypassApprovalsAndSandbox: false
  implementor:
    role: "engineer"
    adapter:
      type: "claude_local"
      config:
        model: "claude-sonnet-4-6"
        maxTurnsPerRun: 300
        dangerouslySkipPermissions: false
  validator:
    role: "qa"
    adapter:
      type: "codex_local"
      config:
        dangerouslyBypassApprovalsAndSandbox: false
  debugger:
    role: "qa"
    adapter:
      type: "claude_local"
      config:
        model: "claude-opus-4-6"
        maxTurnsPerRun: 200
        dangerouslySkipPermissions: false
projects:
  tflabs-poc:
    status: "in_progress"
    workspaces:
      tflabs-poc:
        name: "tflabs-poc"
        isPrimary: true
        sourceType: "local_path"
        cwd: "/Users/ker/_Projects/Active/MentorMesh/tflabs-poc"
        visibility: "default"
  tflabs-edu-fe:
    status: "in_progress"
    workspaces:
      tflabs-edu-fe:
        name: "tflabs-edu-fe"
        isPrimary: true
        sourceType: "local_path"
        cwd: "/Users/ker/_Projects/Active/MentorMesh/tflabs-edu-fe"
        visibility: "default"
sidebar:
  agents:
    - "venture-lead"
    - "implementor"
    - "spec-writer"
  projects:
    - "tflabs-poc"
    - "tflabs-edu-fe"
